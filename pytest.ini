[pytest]
minversion = 7.0
testpaths =
    radiospectra
    docs
norecursedirs =
    .tox
    build
    docs/_build
    docs/generated
    *.egg-info
    examples
    radiospectra/_dev
    .history
    radiospectra/extern
doctest_plus = enabled
doctest_optionflags =
    NORMALIZE_WHITESPACE
    FLOAT_CMP
    ELLIPSIS
text_file_format = rst
addopts =
    --doctest-rst
    -p no:unraisableexception
    -p no:threadexception
    -m "not mpl_image_compare"
mpl-results-path = figure_test_images
mpl-use-full-test-name = true
markers =
    remote_data: marks this test function as needing remote data.
    mpl_image_compare: marks this test function as using hash-based Matplotlib figure verification. This mark is not meant to be directly applied, but is instead automatically applied when a test function uses the @radiospectra.tests.helpers.figure_test decorator.
remote_data_strict = true
filterwarnings =
    # A list of warnings to ignore follows. If you add to this list, you MUST
    # add a comment or ideally a link to an issue that explains why the warning
    # is being ignored
    error
    #
    # This is due to dependencies building with a numpy version different from
    # the local installed numpy version, but should be fine
    # See https://github.com/numpy/numpy/issues/15748#issuecomment-598584838
    ignore:numpy.ufunc size changed:RuntimeWarning
    ignore:numpy.ndarray size changed:RuntimeWarning
    # Zeep
    ignore:'cgi' is deprecated:DeprecationWarning
    # Issue with pytest-cov injecting --rsync arg https://github.com/pytest-dev/pytest-xdist/issues/825
    # https://github.com/pytest-dev/pytest-cov/issues/557
    ignore:The --rsyncdir command line argument and rsyncdirs config variable are deprecated.:DeprecationWarning
    ignore:File may have been truncated.*
    ignore:pattern has been replaced with the format keyword
    # pyparsing deprecation warning from old matplotlib in oldestdeps
    ignore:.*deprecated:pyparsing.warnings.PyparsingDeprecationWarning
    # sunpy_soar is now included in sunpy >= 8.0.
    # This filter is temporary and can be removed once the next release of sunpy is made.
    ignore:Skipping registering the sunpy_soar client:sunpy.util.exceptions.SunpyUserWarning
